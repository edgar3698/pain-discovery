<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pain Discovery — Field Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080a; --bg2:#0c0d0f; --panel:#111214; --panel2:#15161a;
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
    --ink:#ECECEE; --muted:#8A8C92; --faint:#5C5E66;
    --crimson:#C8102E; --crimson2:#E62740; --gold:#C9A86A;
    --sans:'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
    --disp:'Space Grotesk','Inter',Helvetica,Arial,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(200,16,46,.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(201,168,106,.05), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.55;
    letter-spacing:.01em;
  }
  ::selection{background:var(--crimson); color:#fff;}

  /* ---------- Top classification stripe ---------- */
  .stripe{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; padding:9px 22px;
    background:rgba(8,8,10,.82); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    font-family:var(--mono); font-size:11px; letter-spacing:.28em;
    text-transform:uppercase; color:var(--muted);
  }
  .stripe .tag{display:flex; align-items:center; gap:10px;}
  .stripe .dot{width:6px; height:6px; background:var(--crimson); border-radius:50%; box-shadow:0 0 10px var(--crimson);}

  /* ---------- Language switch ---------- */
  .lang{
    display:inline-flex; align-items:center; gap:9px;
    padding:6px 12px 6px 8px; cursor:pointer;
    background:var(--panel); border:1px solid var(--line2); border-radius:2px;
    color:var(--ink); font-family:var(--mono); font-size:11px; letter-spacing:.2em;
    transition:border-color .2s, background .2s; user-select:none;
  }
  .lang:hover{border-color:var(--crimson); background:var(--panel2);}
  .lang svg{width:26px; height:16px; display:block; border:1px solid rgba(255,255,255,.18); border-radius:1px;}
  .lang .swap{color:var(--faint); font-size:10px;}

  /* ---------- Layout ---------- */
  .wrap{max-width:920px; margin:0 auto; padding:46px 26px 120px;}
  .hero{position:relative; padding:30px 0 26px; border-bottom:1px solid var(--line);}
  .kicker{font-family:var(--mono); font-size:11px; letter-spacing:.36em; text-transform:uppercase; color:var(--crimson); margin:0 0 18px;}
  h1{
    font-family:var(--disp); font-weight:700; font-size:clamp(40px,8vw,76px);
    line-height:.96; letter-spacing:-.02em; margin:0; text-transform:uppercase;
  }
  .subtitle{margin:16px 0 0; color:var(--muted); font-size:15px; max-width:46ch;}

  /* ---------- Case file meta ---------- */
  .casefile{
    margin-top:30px; display:grid; grid-template-columns:repeat(2,1fr); gap:1px;
    background:var(--line); border:1px solid var(--line);
  }
  .field{background:var(--bg2); padding:14px 16px;}
  .field label{display:block; font-family:var(--mono); font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--faint); margin-bottom:7px;}
  .field input{
    width:100%; background:transparent; border:0; color:var(--ink);
    font-family:var(--sans); font-size:15px; font-weight:500; padding:0; outline:none;
  }
  .field input::placeholder{color:var(--faint); font-weight:400;}

  /* ---------- Doctrine / loop ---------- */
  section{margin-top:64px;}
  .sec-head{display:flex; align-items:baseline; gap:16px; margin-bottom:22px;}
  .sec-idx{font-family:var(--mono); font-size:12px; color:var(--crimson); letter-spacing:.2em; padding-top:4px;}
  .sec-title{font-family:var(--disp); font-weight:600; font-size:22px; letter-spacing:.01em; margin:0; text-transform:uppercase;}
  .sec-sub{color:var(--muted); font-size:14px; margin:3px 0 0;}

  .loop{display:grid; gap:1px; background:var(--line); border:1px solid var(--line);}
  .loop .row{display:flex; align-items:center; gap:18px; background:var(--bg2); padding:16px 20px;}
  .loop .n{font-family:var(--mono); font-size:13px; color:var(--gold); width:24px; flex:none;}
  .loop .t{font-family:var(--disp); font-weight:500; font-size:16px; letter-spacing:.04em; text-transform:uppercase;}

  .map-note{
    margin-top:22px; padding:18px 22px; border-left:2px solid var(--crimson);
    background:var(--panel); color:var(--muted); font-size:14.5px; font-style:italic;
  }

  /* ---------- Phases ---------- */
  .phase{margin-top:30px; border:1px solid var(--line); background:var(--panel); }
  .phase-head{
    display:flex; align-items:baseline; gap:18px; padding:20px 24px 18px;
    border-bottom:1px solid var(--line); position:relative;
  }
  .phase-head::before{content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--crimson);}
  .phase-num{font-family:var(--mono); font-size:28px; font-weight:600; color:var(--faint); line-height:1; flex:none; letter-spacing:.02em;}
  .phase-titles h3{margin:0; font-family:var(--disp); font-weight:600; font-size:20px; text-transform:uppercase; letter-spacing:.01em;}
  .phase-titles p{margin:4px 0 0; color:var(--muted); font-size:13.5px;}
  .phase-lead{padding:16px 24px 4px; color:var(--gold); font-size:13.5px; font-style:italic;}

  .q{padding:22px 24px; border-top:1px solid var(--line);}
  .q:first-of-type{border-top:0;}
  .q .qline{display:flex; gap:14px; align-items:flex-start;}
  .q .qmark{font-family:var(--mono); color:var(--crimson); font-size:14px; line-height:1.7; flex:none;}
  .q .qtext{font-size:17px; font-weight:600; color:var(--ink); line-height:1.45;}
  .q .note{margin:12px 0 0 28px; padding-left:14px; border-left:1px solid var(--line2); color:var(--muted); font-size:13.5px; line-height:1.5;}
  .q .note .nb{color:var(--gold); font-family:var(--mono); font-size:10px; letter-spacing:.24em; text-transform:uppercase; display:block; margin-bottom:6px;}

  .answer{margin:16px 0 0 28px;}
  .answer .alabel{font-family:var(--mono); font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--faint); margin-bottom:8px; display:flex; align-items:center; gap:8px;}
  .answer .alabel::before{content:''; width:14px; height:1px; background:var(--crimson);}
  textarea{
    width:100%; min-height:54px; resize:none; overflow:hidden;
    background:var(--bg2); border:1px solid var(--line2); border-radius:2px;
    color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.55;
    padding:13px 15px; outline:none; transition:border-color .18s;
  }
  textarea:focus{border-color:var(--crimson);}
  textarea::placeholder{color:var(--faint);}

  /* Static answer mirror — used for PDF/print so nothing is clipped or scrollable */
  .print-answer{
    display:none; white-space:pre-wrap; word-break:break-word; min-height:54px;
    background:var(--bg2); border:1px solid var(--line2); border-radius:2px;
    color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.55; padding:13px 15px;
  }

  /* ---------- Principles ---------- */
  .principles{display:grid; gap:1px; background:var(--line); border:1px solid var(--line);}
  .principle{background:var(--bg2); padding:22px 24px;}
  .principle h4{margin:0 0 8px; font-family:var(--disp); font-weight:600; font-size:16px; text-transform:uppercase; letter-spacing:.02em; color:var(--ink);}
  .principle h4 span{color:var(--crimson); font-family:var(--mono); font-size:12px; margin-right:10px;}
  .principle p{margin:0; color:var(--muted); font-size:14px; line-height:1.55;}

  .signal{
    margin-top:30px; padding:26px 28px; border:1px solid var(--line2);
    background:linear-gradient(180deg, rgba(200,16,46,.07), transparent);
  }
  .signal .st{font-family:var(--mono); font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--crimson); margin-bottom:12px;}
  .signal p{margin:0; font-size:16px; line-height:1.6;}
  .signal strong{color:var(--gold);}

  /* ---------- Footer / actions ---------- */
  .actions{
    position:fixed; bottom:0; left:0; right:0; z-index:35;
    display:flex; align-items:center; justify-content:center; gap:10px;
    padding:14px; background:rgba(8,8,10,.86); backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
  }
  button.btn{
    display:inline-flex; align-items:center; gap:9px;
    padding:11px 20px; cursor:pointer; font-family:var(--mono); font-size:11px;
    letter-spacing:.2em; text-transform:uppercase; color:var(--ink);
    background:var(--panel); border:1px solid var(--line2); border-radius:2px;
    transition:border-color .18s, background .18s, color .18s;
  }
  button.btn:hover{border-color:var(--crimson); background:var(--panel2);}
  button.btn.primary{background:var(--crimson); border-color:var(--crimson); color:#fff;}
  button.btn.primary:hover{background:var(--crimson2); border-color:var(--crimson2);}
  button.btn svg{width:14px; height:14px;}
  .save-status{font-family:var(--mono); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); min-width:74px;}

  .colophon{margin-top:70px; padding-top:22px; border-top:1px solid var(--line); display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; font-family:var(--mono); font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--faint);}

  @media (max-width:620px){
    .casefile{grid-template-columns:1fr;}
    .actions{flex-wrap:wrap;}
    .save-status{display:none;}
  }

  /* ===================== PRINT / PDF (dark dossier) ===================== */
  @media print{
    @page{ margin:14mm; }
    html,body{
      background:#08080a !important; color:#ECECEE !important;
      -webkit-print-color-adjust:exact; print-color-adjust:exact;
    }
    .stripe, .actions, .lang, .colophon .noprint{display:none !important;}
    .wrap{max-width:100%; padding:0;}
    .hero{border-color:rgba(255,255,255,.25) !important;}
    section{margin-top:30px; break-inside:avoid;}
    .phase, .q, .principle, .signal, .loop .row, .field{break-inside:avoid;}
    .phase{page-break-inside:auto;}
    textarea{display:none !important;}
    .print-answer{
      display:block !important; background:#0c0d0f !important;
      border:1px solid rgba(255,255,255,.28) !important; color:#ECECEE !important;
      -webkit-print-color-adjust:exact; print-color-adjust:exact;
    }
    .field, .loop .row, .principle{background:#0c0d0f !important;}
    .map-note, .phase, .signal{background:#0d0e10 !important;}
    input{color:#ECECEE !important;}
    .print-only{display:block !important;}
  }
  .print-only{display:none;}

  /* Same swap while rendering the shareable PDF off-screen */
  body.exporting textarea{display:none !important;}
  body.exporting .print-answer{display:block !important;}
</style>
</head>

      <span id="t-save">Save image</span>

  </div>

/* ====================== STATE ====================== */
const STORE_KEY = 'painDiscovery.answers.v1';
const LANG_KEY  = 'painDiscovery.lang.v1';
let lang = localStorage.getItem(LANG_KEY) || 'en';
let answers = loadAnswers();

function loadAnswers(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; }
}
function persist(){
  localStorage.setItem(STORE_KEY, JSON.stringify(answers));
  flashSaved();
}
let saveTimer=null;
function flashSaved(){
  const el=document.getElementById('saveStatus'); const t=I18N[lang];
  el.textContent=t.saving; clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ el.textContent='● '+t.saved; },350);
}

/* ====================== RENDER ====================== */
function autosize(ta){ ta.style.height='auto'; ta.style.height=(ta.scrollHeight)+'px'; }

function render(){
  const t = I18N[lang];
  document.documentElement.lang = t.htmlLang;
  document.title = t.docTitle;

  // flag button shows the language you'll switch TO
  document.getElementById('flag').innerHTML = FLAGS[t.flag];
  document.getElementById('langCode').textContent = t.next;

  // static text
  const set=(id,txt)=>{const e=document.getElementById(id); if(e) e.textContent=txt;};
  set('t-classification',t.classification);
  set('t-kicker',t.kicker);
  set('t-title',t.title);
  set('t-subtitle',t.subtitle);
  set('l-subject',t.labels.subject);
  set('l-agent',t.labels.agent);
  set('l-operation',t.labels.operation);
  set('l-date',t.labels.date);
  set('t-loop-title',t.loopTitle);
  set('t-mapnote',t.mapNote);
  set('t-phases-idx',t.phasesIdx);
  set('t-phases-title',t.phasesTitle);
  set('t-phases-sub',t.phasesSub);
  set('t-principles-title',t.principlesTitle);
  set('t-signal-title',t.signalTitle);
  document.getElementById('t-signal').innerHTML = t.signal;
  set('t-colo-left',t.coloLeft);
  set('t-colo-right',t.coloRight);
  set('t-share',t.btn.share);
  set('t-save',t.btn.save);
  set('t-clear',t.btn.clear);
  flashSaved();

  // meta fields
  ['m_subject','m_agent','m_operation','m_date'].forEach(k=>{
    const inp=document.getElementById(k);
    inp.value = answers[k] || '';
    inp.placeholder = t.placeholders[k.replace('m_','')] || '';
  });

  // loop
  document.getElementById('loop').innerHTML = t.loop.map((txt,i)=>
    `<div class="row"><span class="n">0${i+1}</span><span class="t">${txt}</span></div>`).join('');

  // phases
  document.getElementById('phases').innerHTML = t.phases.map(ph=>{
    const lead = ph.lead ? `<div class="phase-lead">${ph.lead}</div>` : '';
    const items = ph.items.map(it=>{
      const note = it.note ? `<div class="note"><span class="nb">${t.noteLabel}</span>${it.note}</div>` : '';
      const val = (answers[it.id]||'').replace(/"/g,'&quot;');
      return `<div class="q">
        <div class="qline"><span class="qmark">▸</span><span class="qtext">${it.q}</span></div>
        ${note}
        <div class="answer">
          <div class="alabel">${t.answerLabel}</div>
          <textarea data-key="${it.id}" placeholder="…">${answers[it.id]||''}</textarea>
          <div class="print-answer">${(answers[it.id]||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="phase">
      <div class="phase-head">
        <span class="phase-num">${ph.num}</span>
        <div class="phase-titles"><h3>${ph.title}</h3>${ph.sub?`<p>${ph.sub}</p>`:''}</div>
      </div>
      ${lead}
      ${items}
    </div>`;
  }).join('');

  // principles
  document.getElementById('principles').innerHTML = t.principles.map((p,i)=>
    `<div class="principle"><h4><span>0${i+1}</span>${p.h}</h4><p>${p.b}</p></div>`).join('');

  // bind inputs
  document.querySelectorAll('textarea[data-key]').forEach(ta=>{
    autosize(ta);
    ta.addEventListener('input',()=>{
      answers[ta.dataset.key]=ta.value; autosize(ta);
      const m=ta.parentElement.querySelector('.print-answer'); if(m) m.textContent=ta.value;
      persist();
    });
  });
  document.querySelectorAll('input[data-key]').forEach(inp=>{
    inp.addEventListener('input',()=>{ answers[inp.dataset.key]=inp.value; persist(); });
  });
}

/* ====================== ACTIONS ====================== */
document.getElementById('langBtn').addEventListener('click',()=>{
  lang = (lang==='en') ? 'ru' : 'en';
  localStorage.setItem(LANG_KEY, lang);
  render();
});

function fileBase(){
  return (answers.m_subject||'pain-discovery').toString().trim()
    .replace(/[^\w\- ]+/g,'').replace(/\s+/g,'_').slice(0,40) || 'pain-discovery';
}

// Copy each textarea's text into its static mirror so the PDF/print shows
// the full answer with no scrollbar or clipping.
function syncMirrors(){
  document.querySelectorAll('textarea[data-key]').forEach(ta=>{
    const m=ta.parentElement.querySelector('.print-answer'); if(m) m.textContent=ta.value;
  });
}
window.addEventListener('beforeprint', syncMirrors);

// Render the dossier to a single dark PNG — preserves the exact appearance,
// previews inline in any messenger, no page frame / white margins.
// Render the dossier to a dark, full-bleed, paginated PDF — opens full-screen
// and readable in any messenger, no white page frame, appearance preserved.
async function buildPdfBlob(){
  syncMirrors();
  document.body.classList.add('exporting');
  const el = document.querySelector('.wrap');
  try{
    const canvas = await html2canvas(el, {
      backgroundColor:'#08080a', scale:2, useCORS:true,
      width: el.offsetWidth, windowWidth:960, scrollX:0, scrollY:0
    });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'pt', format:'a4', compress:true });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW  = pageW;                               // full bleed, no side margin
    const imgH  = canvas.height * imgW / canvas.width;
    const img   = canvas.toDataURL('image/jpeg', 0.95);

    let position = 0, heightLeft = imgH;
    const paint = () => { pdf.setFillColor(8,8,10); pdf.rect(0,0,pageW,pageH,'F'); };
    paint();
    pdf.addImage(img, 'JPEG', 0, position, imgW, imgH, 'page', 'FAST');
    heightLeft -= pageH;
    while(heightLeft > 0){
      position -= pageH;
      pdf.addPage();
      paint();
      pdf.addImage(img, 'JPEG', 0, position, imgW, imgH, 'page', 'FAST');
      heightLeft -= pageH;
    }
    return pdf.output('blob');
  } finally {
    document.body.classList.remove('exporting');
  }
}

function downloadBlob(blob, name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
}

async function exportPdf(doShare){
  const t=I18N[lang];
  if(typeof html2canvas==='undefined' || !window.jspdf){ alert(t.shareError); return; }
  const btn   = document.getElementById(doShare?'btnShare':'btnSave');
  const label = document.getElementById(doShare?'t-share':'t-save');
  const orig  = label.textContent;
  label.textContent=t.sharePrep; btn.disabled=true;
  window.scrollTo(0,0);
  try{
    const blob = await buildPdfBlob();
    const file = new File([blob], fileBase()+'.pdf', {type:'application/pdf'});
    if(doShare && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:t.shareTitle, text:t.shareText});
    }else{
      downloadBlob(blob, file.name);
      if(doShare) alert(t.shareFallback);
    }
  }catch(err){
    if(err && err.name!=='AbortError') alert(t.shareError);
  }finally{
    label.textContent=orig; btn.disabled=false;
  }
}

document.getElementById('btnShare').addEventListener('click',()=>exportPdf(true));
document.getElementById('btnSave').addEventListener('click',()=>exportPdf(false));

document.getElementById('btnClear').addEventListener('click',()=>{
  if(confirm(I18N[lang].clearConfirm)){ answers={}; persist(); render(); }
});

/* ====================== INIT ====================== */
render();
</script>
